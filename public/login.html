<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BitBubbles PRO — Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0f;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,sans-serif}
    .card{background:#111118;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px;width:100%;max-width:380px}
    .logo{text-align:center;margin-bottom:32px}
    .logo h1{color:#fff;font-size:20px;font-weight:600}
    .logo p{color:#555;font-size:13px;margin-top:4px}
    label{display:block;font-size:12px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em}
    input{width:100%;background:#0a0a0f;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;margin-bottom:16px;outline:none}
    input:focus{border-color:rgba(99,102,241,0.5)}
    button{width:100%;background:#6366f1;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
    button:hover{background:#4f46e5}
    .error{color:#ef4444;font-size:13px;text-align:center;margin-top:12px;display:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>BitBubbles PRO</h1>
      <p>Terminal Quant v4</p>
    </div>
    <label>Email</label>
    <input type="email" id="email" placeholder="seu@email.com"/>
    <label>Senha</label>
    <input type="password" id="password" placeholder="••••••••"/>
    <button onclick="login()">Entrar</button>
    <div class="error" id="error"></div>
  </div>

  <script>
    async function login() {
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error');
      errEl.style.display = 'none';

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error || 'Erro ao fazer login';
        errEl.style.display = 'block';
        return;
      }

      // Salva o token e redireciona pro terminal
      localStorage.setItem('bb_token', data.token);
      window.location.href = '/api/terminal?token=' + data.token;
    }

    // Permite entrar com Enter
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
